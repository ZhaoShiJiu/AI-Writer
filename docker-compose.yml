networks:
  write-network:
    driver: bridge

volumes:
  postgresql-data:
  redis-data:
  chroma-data:
  neo4j-data:
  neo4j-logs:

services:
  postgres:
    image: postgres:16
    container_name: novel-write-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - write-network
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: novel-write-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - write-network
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}","ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: novel-write-gateway
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    networks:
      - write-network
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  chroma:
    build:
      context: ./chroma
      dockerfile: Dockerfile
    container_name: novel-write-chroma
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - write-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  neo4j:
    image: neo4j:5.26
    container_name: novel-write-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - write-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novel-write-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LLM_GATEWAY_URL: http://gateway:8001
      NO_PROXY: gateway,postgres,redis,chroma,localhost,127.0.0.1
      no_proxy: gateway,postgres,redis,chroma,localhost,127.0.0.1
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      EMBEDDING_MODEL: dashscope/text-embedding-v4
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: neo4j
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - write-network

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: novel-write-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:3000\",function(r){process.exit(0)}).on(\"error\",function(){process.exit(1)})'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NO_PROXY: backend,gateway,postgres,redis,localhost,127.0.0.1
      no_proxy: backend,gateway,postgres,redis,localhost,127.0.0.1
    depends_on:
      - backend
    networks:
      - write-network
